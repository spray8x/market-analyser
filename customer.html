<!DOCTYPE html>
<html lang="en">
<head> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; img-src 'self' https://placehold.co https://*.placehold.co data: blob:; connect-src 'self';">

<title>VendorPulse — Marketplace</title>
<link rel="stylesheet" href="css/base.css">
<style>
/* ── Layout ── */
.mkt-layout { display: flex; min-height: calc(100vh - 58px); }

/* ── Filter Sidebar ── */
.filter-sidebar {
  width: 240px; flex-shrink: 0;
  background: var(--col-surface); border-right: 1px solid var(--col-border);
  padding: var(--sp-md);
  position: sticky; top: 58px; height: calc(100vh - 58px); overflow-y: auto;
}
.filter-group { margin-bottom: var(--sp-lg); }
.filter-label { font-size: .72rem; text-transform: uppercase; letter-spacing: .08em; color: var(--col-text-muted); margin-bottom: var(--sp-sm); display: block; }

.cat-btn {
  display: flex; align-items: center; gap: 10px;
  width: 100%; padding: 8px 10px; border-radius: var(--r-sm);
  border: none; background: none; cursor: pointer;
  font-family: var(--font-body); font-size: .85rem; color: var(--col-text-muted);
  transition: all .15s; text-align: left;
}
.cat-btn:hover { background: var(--col-card); color: var(--col-text); }
.cat-btn.active { background: rgba(245,166,35,.1); color: var(--col-accent); font-weight: 600; }
.cat-btn .cat-icon { font-size: 1rem; width: 20px; text-align: center; }
.cat-btn .cat-count { margin-left: auto; font-size: .72rem; color: var(--col-text-dim); }

.brand-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.brand-chip {
  padding: 4px 10px; border-radius: 99px;
  border: 1px solid var(--col-border); background: none;
  font-size: .75rem; cursor: pointer; color: var(--col-text-muted);
  transition: all .15s; font-family: var(--font-body);
}
.brand-chip.active { border-color: var(--col-accent); color: var(--col-accent); background: rgba(245,166,35,.08); }

.price-range-row { display: flex; justify-content: space-between; font-size: .78rem; color: var(--col-text-muted); margin-top: 6px; }

/* ── Main area ── */
.mkt-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

/* ── Search / sort bar ── */
.search-bar {
  padding: var(--sp-md) var(--sp-lg);
  border-bottom: 1px solid var(--col-border);
  display: flex; align-items: center; gap: var(--sp-md);
  background: var(--col-surface); position: sticky; top: 58px; z-index: 10;
}
.search-bar .search-wrap {
  flex: 1; position: relative;
}
.search-bar .search-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  font-size: 1rem; pointer-events: none; color: var(--col-text-muted);
}
.search-bar input { padding-left: 38px; }
.sort-select { width: 180px; }
.result-count { font-size: .82rem; color: var(--col-text-muted); white-space: nowrap; }

/* ── Product grid ── */
.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: var(--sp-md); padding: var(--sp-lg);
}

.product-card {
  background: var(--col-card); border: 1px solid var(--col-border);
  border-radius: var(--r-md); overflow: hidden;
  display: flex; flex-direction: column;
  transition: border-color .2s, transform .2s, box-shadow .2s;
  cursor: pointer;
}
.product-card:hover {
  border-color: var(--col-border-hi); transform: translateY(-3px); box-shadow: var(--shadow-md);
}
.product-card img {
  width: 100%; height: 160px; object-fit: cover;
  background: var(--col-surface);
}
.product-card .card-body { padding: var(--sp-md); display: flex; flex-direction: column; gap: 8px; flex: 1; }
.product-card .p-brand { font-size: .72rem; text-transform: uppercase; letter-spacing: .06em; color: var(--col-text-muted); }
.product-card .p-name { font-weight: 600; font-size: .9rem; line-height: 1.3; }
.product-card .p-price { font-family: var(--font-display); font-size: 1.2rem; font-weight: 700; color: var(--col-text); }
.product-card .p-unit { font-size: .75rem; font-weight: 400; color: var(--col-text-muted); }
.product-card .p-meta { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
.product-card .p-rating { font-size: .78rem; color: var(--col-text-muted); }
.product-card .p-rating .stars { color: var(--col-accent); }
.product-card .add-btn {
  background: var(--col-accent); color: #111; border: none; border-radius: var(--r-sm);
  padding: 6px 14px; font-weight: 700; font-size: .8rem; cursor: pointer; font-family: var(--font-body);
  transition: background .15s;
}
.product-card .add-btn:hover { background: #ffb83d; }
.product-card .moq-badge { font-size: .7rem; color: var(--col-text-dim); }

/* ── Cart drawer ── */
.cart-btn {
  position: relative; background: var(--col-card);
  border: 1px solid var(--col-border); border-radius: var(--r-sm);
  padding: 8px 16px; cursor: pointer; color: var(--col-text);
  font-family: var(--font-body); font-size: .85rem; font-weight: 600;
  display: flex; align-items: center; gap: 8px; transition: border-color .15s;
}
.cart-btn:hover { border-color: var(--col-accent); }
.cart-count {
  background: var(--col-accent); color: #111;
  border-radius: 99px; width: 20px; height: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: .7rem; font-weight: 800;
}

.cart-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.5);
  z-index: 200; display: none;
}
.cart-overlay.open { display: block; }

.cart-drawer {
  position: fixed; top: 0; right: -420px; width: 420px; height: 100vh;
  background: var(--col-surface); border-left: 1px solid var(--col-border);
  z-index: 201; display: flex; flex-direction: column;
  transition: right .3s ease;
  box-shadow: var(--shadow-lg);
}
.cart-drawer.open { right: 0; }
.cart-head {
  padding: var(--sp-lg); border-bottom: 1px solid var(--col-border);
  display: flex; align-items: center; justify-content: space-between;
}
.cart-head h2 { font-family: var(--font-display); font-size: 1.1rem; }
.cart-close { background: none; border: none; color: var(--col-text-muted); font-size: 1.4rem; cursor: pointer; }
.cart-items { flex: 1; overflow-y: auto; padding: var(--sp-md); display: flex; flex-direction: column; gap: var(--sp-md); }
.cart-item {
  background: var(--col-card); border: 1px solid var(--col-border);
  border-radius: var(--r-sm); padding: var(--sp-md);
  display: flex; gap: var(--sp-md); align-items: flex-start;
}
.cart-item img { width: 60px; height: 60px; object-fit: cover; border-radius: var(--r-sm); }
.cart-item-info { flex: 1; }
.cart-item-name { font-weight: 600; font-size: .88rem; }
.cart-item-brand { font-size: .75rem; color: var(--col-text-muted); }
.cart-item-price { font-family: var(--font-display); font-weight: 700; margin-top: 4px; }
.qty-control { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
.qty-btn { background: var(--col-border); border: none; color: var(--col-text); width: 26px; height: 26px; border-radius: 4px; cursor: pointer; font-size: 1rem; font-weight: 700; }
.qty-btn:hover { background: var(--col-accent); color: #111; }
.qty-val { font-weight: 600; min-width: 24px; text-align: center; font-size: .9rem; }
.cart-rm { background: none; border: none; color: var(--col-text-dim); cursor: pointer; font-size: 1.1rem; margin-left: auto; }
.cart-rm:hover { color: var(--col-red); }
.cart-foot { padding: var(--sp-lg); border-top: 1px solid var(--col-border); }
.cart-total-row { display: flex; justify-content: space-between; margin-bottom: var(--sp-md); }
.cart-total-label { color: var(--col-text-muted); font-size: .88rem; }
.cart-total-val { font-family: var(--font-display); font-weight: 700; font-size: 1.3rem; }
.cart-empty { text-align: center; color: var(--col-text-muted); padding: var(--sp-xl) var(--sp-md); }

/* ── Product detail modal ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.7);
  z-index: 300; display: none; align-items: center; justify-content: center;
  padding: var(--sp-lg);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--col-surface); border: 1px solid var(--col-border);
  border-radius: var(--r-lg); max-width: 760px; width: 100%;
  max-height: 90vh; overflow-y: auto;
  display: flex; flex-direction: column;
  animation: fadeUp .3s ease;
}
.modal-head { padding: var(--sp-lg); border-bottom: 1px solid var(--col-border); display: flex; justify-content: space-between; align-items: flex-start; }
.modal-body { padding: var(--sp-lg); display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-xl); }
.modal-img { width: 100%; height: 220px; object-fit: cover; border-radius: var(--r-md); }
.spec-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--col-border); font-size: .85rem; }
.spec-key { color: var(--col-text-muted); }
.spec-val { font-weight: 500; }
.vendor-price-list { display: flex; flex-direction: column; gap: 8px; margin-top: var(--sp-md); }
.vp-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-radius: var(--r-sm); background: var(--col-card); font-size: .85rem; }
.vp-name { color: var(--col-text-muted); }
.vp-price { font-weight: 700; }
.vp-lowest { border: 1px solid rgba(46,204,143,.3); }

/* ── City pill in topbar ── */
.city-pill { font-size:.8rem; color: var(--col-text-muted); display: flex; align-items: center; gap: 6px; }
.city-pill select { width: 130px; padding: 5px 8px; font-size: .8rem; }

/* ── Empty state ── */
.empty-state { grid-column: 1/-1; text-align: center; padding: var(--sp-2xl); color: var(--col-text-muted); }
.empty-state .empty-icon { font-size: 3rem; margin-bottom: var(--sp-md); }
</style>
</head>
<body>

<nav class="topbar">
  <a href="index.html" class="topbar-logo">Vendor<span>Pulse</span></a>
  <span class="role-badge" style="background:rgba(79,195,247,.12);color:var(--col-accent3);border-color:rgba(79,195,247,.3)">Buyer</span>
  <div class="city-pill" style="margin-left:auto">
    📍
    <select id="city-sel-cust" onchange="onCityChange(this.value)">
      <option value="Mumbai">Mumbai</option>
      <option value="Delhi">Delhi</option>
      <option value="Bangalore">Bangalore</option>
      <option value="Chennai">Chennai</option>
      <option value="Hyderabad">Hyderabad</option>
      <option value="Ahmedabad">Ahmedabad</option>
      <option value="Pune">Pune</option>
      <option value="Kolkata">Kolkata</option>
    </select>
  </div>
  <button class="cart-btn" onclick="openCart()">
    🛒 Cart <span class="cart-count" id="cart-count">0</span>
  </button>
  <a href="index.html" class="btn btn-ghost" style="font-size:.8rem;padding:6px 14px" onclick="Auth.clearRole()">← Switch Role</a>
</nav>

<div class="mkt-layout">

  <!-- Filter sidebar -->
  <aside class="filter-sidebar">
    <div class="filter-group">
      <span class="filter-label">Category</span>
      <div id="cat-list"></div>
    </div>
    <div class="divider"></div>
    <div class="filter-group">
      <span class="filter-label">Brand</span>
      <div class="brand-chips" id="brand-chips"></div>
    </div>
    <div class="divider"></div>
    <div class="filter-group">
      <span class="filter-label">Price Range (₹)</span>
      <input type="range" id="price-range" min="0" max="50000" value="50000" oninput="onPriceRange(this.value)">
      <div class="price-range-row">
        <span>₹0</span>
        <span id="price-range-val">₹50,000</span>
      </div>
    </div>
    <div class="divider"></div>
    <button class="btn btn-ghost" style="width:100%;margin-top:auto" onclick="clearFilters()">Clear Filters</button>
  </aside>

  <!-- Main marketplace -->
  <div class="mkt-main">
    <!-- Search / sort bar -->
    <div class="search-bar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="search" id="search-input" placeholder="Search products, brands…" oninput="renderGrid()">
      </div>
      <select class="sort-select" id="sort-sel" onchange="renderGrid()">
        <option value="">Sort: Relevance</option>
        <option value="price_asc">Price: Low to High</option>
        <option value="price_desc">Price: High to Low</option>
        <option value="rating">Top Rated</option>
        <option value="reviews">Most Reviewed</option>
      </select>
      <span class="result-count" id="result-count"></span>
    </div>

    <!-- Product grid -->
    <div class="product-grid" id="product-grid">
      <div class="empty-state"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<!-- Cart overlay + drawer -->
<div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cart-drawer">
  <div class="cart-head">
    <h2>My Cart</h2>
    <button class="cart-close" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-foot">
    <div class="cart-total-row">
      <span class="cart-total-label">Total</span>
      <span class="cart-total-val" id="cart-total">₹0</span>
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="checkout()">Request Quote →</button>
  </div>
</div>

<!-- Product detail modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-content"></div>
</div>

<div id="toast-container"></div>

<script src="js/auth.js"></script>
<script src="js/pricing.js"></script>
<script src="js/data.js"></script>
<script>
if (!Auth.requireRole('customer')) { /* redirected */ }

let _cityMul = {};
let _vendors  = [];
let _currentCity = Auth.getCity();
let _filters = { category: '', brands: new Set(), maxPrice: 50000, search: '', sort: '' };
let _cart    = [];  // { product, qty, unitPrice }

// ── Init ──
document.addEventListener('DOMContentLoaded', async () => {
  document.getElementById('city-sel-cust').value = _currentCity;

  try {
    await DataStore.init();
    _cityMul = DataStore.getCityMultipliers();
    _vendors  = DataStore.getVendors();

    buildCategoryList();
    buildBrandChips();
    updatePriceRange();
    renderGrid();
  } catch(e) {
    console.error('[VendorPulse] Customer init failed:', e);
    const grid = document.getElementById('product-grid');
    if (grid) grid.innerHTML = `<div class="empty-state">
      <div class="empty-icon">⚠️</div>
      <p style="color:#e74c5e;font-weight:600">Data load failed</p>
      <p style="font-size:.82rem;margin-top:8px">${e.message || e}</p>
      <p style="font-size:.75rem;color:var(--col-text-dim);margin-top:8px">Serve via HTTP: <code>python3 -m http.server 8000</code></p>
    </div>`;
  }
});

function onCityChange(city) {
  _currentCity = city;
  Auth.setCity(city);
  renderGrid();
  renderCart();
}

// ── Category list ──
function buildCategoryList() {
  const cats = DataStore.getCategories();
  const all  = DataStore.getProducts();
  const el   = document.getElementById('cat-list');

  el.innerHTML = `<button class="cat-btn active" onclick="selectCat('',this)">
    <span class="cat-icon">🏪</span> All Products
    <span class="cat-count">${all.length}</span>
  </button>`;

  cats.forEach(c => {
    const count = DataStore.getProducts({ category: c.id }).length;
    el.insertAdjacentHTML('beforeend', `
      <button class="cat-btn" onclick="selectCat('${esc(c.id)}',this)">
        <span class="cat-icon">${esc(c.icon)}</span> ${esc(c.label)}
        <span class="cat-count">${count}</span>
      </button>`);
  });
}

function selectCat(id, btn) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  _filters.category = id;
  buildBrandChips();
  renderGrid();
}

// ── Brand chips ──
function buildBrandChips() {
  const brands = DataStore.getBrands(_filters.category || null);
  const el = document.getElementById('brand-chips');
  el.innerHTML = brands.map(b => `
    <button class="brand-chip${_filters.brands.has(b)?' active':''}" onclick="toggleBrand('${esc(b)}',this)">${esc(b)}</button>
  `).join('');
}

function toggleBrand(brand, btn) {
  if (_filters.brands.has(brand)) { _filters.brands.delete(brand); btn.classList.remove('active'); }
  else { _filters.brands.add(brand); btn.classList.add('active'); }
  renderGrid();
}

// ── Price range ──
function updatePriceRange() {
  const range = DataStore.getPriceRange(_filters.category || null);
  const el = document.getElementById('price-range');
  el.max   = range.max;
  el.value = range.max;
  _filters.maxPrice = range.max;
  document.getElementById('price-range-val').textContent = Pricing.formatINR(range.max);
}

function onPriceRange(val) {
  _filters.maxPrice = parseInt(val);
  document.getElementById('price-range-val').textContent = Pricing.formatINR(_filters.maxPrice);
  renderGrid();
}

// ── Filters ──
function clearFilters() {
  _filters = { category: '', brands: new Set(), maxPrice: 50000, search: '', sort: '' };
  document.getElementById('search-input').value = '';
  document.getElementById('sort-sel').value = '';
  document.querySelectorAll('.cat-btn').forEach((b,i) => { if(i===0) b.classList.add('active'); else b.classList.remove('active'); });
  buildBrandChips();
  updatePriceRange();
  renderGrid();
}

// ── Product grid ──
function renderGrid() {
  _filters.search = document.getElementById('search-input').value;
  _filters.sort   = document.getElementById('sort-sel').value;

  let products = DataStore.getProducts({
    category: _filters.category || undefined,
    search:   _filters.search || undefined,
    maxPrice: _filters.maxPrice,
    sort:     _filters.sort || undefined
  });

  if (_filters.brands.size) products = products.filter(p => _filters.brands.has(p.brand));

  document.getElementById('result-count').textContent = `${products.length} product${products.length!==1?'s':''}`;

  const grid = document.getElementById('product-grid');
  if (!products.length) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><p>No products match your filters.</p></div>`;
    return;
  }

  grid.innerHTML = products.map(p => {
    const rawPrice  = Pricing.getVendorPrice(p.basePrice, p.id, 'V001');
    const cityPrice = Pricing.applyCityMultiplier(rawPrice, _currentCity, _cityMul);
    const stars     = '★'.repeat(Math.round(p.rating)) + '☆'.repeat(5 - Math.round(p.rating));
    const inCart    = _cart.find(c => c.product.id === p.id);
    return `<div class="product-card anim-fadeup" onclick="openModal('${esc(p.id)}')">
      <img src="${esc(p.image)}" alt="${esc(p.name)}" loading="lazy">
      <div class="card-body">
        <div class="p-brand">${esc(p.brand)}</div>
        <div class="p-name">${esc(p.name)}</div>
        <div>
          <span class="p-price">${Pricing.formatINR(cityPrice)}</span>
          <span class="p-unit"> /${esc(p.unit)}</span>
        </div>
        <div class="p-meta">
          <div>
            <div class="p-rating"><span class="stars">${stars}</span> ${p.rating} (${p.reviews.toLocaleString('en-IN')})</div>
            <div class="moq-badge">Min. ${p.minOrderQty} ${esc(p.unit)}</div>
          </div>
          <button class="add-btn" onclick="event.stopPropagation();addToCart('${esc(p.id)}')">${inCart ? '✓ Added' : '+ Cart'}</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── Cart ──
function addToCart(productId) {
  const p = DataStore.getProduct(productId);
  if (!p) return;
  const rawPrice  = Pricing.getVendorPrice(p.basePrice, p.id, 'V001');
  const cityPrice = Pricing.applyCityMultiplier(rawPrice, _currentCity, _cityMul);

  const existing = _cart.find(c => c.product.id === productId);
  if (existing) {
    existing.qty += p.minOrderQty;
  } else {
    _cart.push({ product: p, qty: p.minOrderQty, unitPrice: cityPrice });
  }
  updateCartCount();
  renderGrid();
  toast(`${p.name} added to cart`, 'success');
}

function removeFromCart(productId) {
  _cart = _cart.filter(c => c.product.id !== productId);
  updateCartCount();
  renderCart();
  renderGrid();
}

function setQty(productId, delta) {
  const item = _cart.find(c => c.product.id === productId);
  if (!item) return;
  item.qty = Math.max(item.product.minOrderQty, item.qty + delta * item.product.minOrderQty);
  renderCart();
}

function updateCartCount() {
  document.getElementById('cart-count').textContent = _cart.length;
}

function openCart() {
  document.getElementById('cart-overlay').classList.add('open');
  document.getElementById('cart-drawer').classList.add('open');
  renderCart();
}

function closeCart() {
  document.getElementById('cart-overlay').classList.remove('open');
  document.getElementById('cart-drawer').classList.remove('open');
}

function renderCart() {
  const el = document.getElementById('cart-items');
  if (!_cart.length) {
    el.innerHTML = `<div class="cart-empty">🛒<br><br>Your cart is empty.<br>Browse products and add them here.</div>`;
    document.getElementById('cart-total').textContent = '₹0';
    return;
  }
  el.innerHTML = _cart.map(c => `
    <div class="cart-item">
      <img src="${esc(c.product.image)}" alt="${esc(c.product.name)}">
      <div class="cart-item-info">
        <div class="cart-item-name">${esc(c.product.name)}</div>
        <div class="cart-item-brand">${esc(c.product.brand)}</div>
        <div class="cart-item-price">${Pricing.formatINR(c.unitPrice * c.qty)}</div>
        <div class="qty-control">
          <button class="qty-btn" onclick="setQty('${esc(c.product.id)}',-1)">−</button>
          <span class="qty-val">${c.qty}</span>
          <button class="qty-btn" onclick="setQty('${esc(c.product.id)}',1)">+</button>
          <span style="font-size:.75rem;color:var(--col-text-muted)">${esc(c.product.unit)}</span>
        </div>
      </div>
      <button class="cart-rm" onclick="removeFromCart('${esc(c.product.id)}')">✕</button>
    </div>`).join('');
  const total = _cart.reduce((s, c) => s + c.unitPrice * c.qty, 0);
  document.getElementById('cart-total').textContent = Pricing.formatINR(total);
}

function checkout() {
  if (!_cart.length) { toast('Cart is empty', 'error'); return; }
  toast('Quote request submitted! Vendors will contact you within 24 hrs.', 'success', 4000);
  _cart = [];
  updateCartCount();
  renderCart();
  closeCart();
  renderGrid();
}

// ── Product modal ──
function openModal(productId) {
  const p = DataStore.getProduct(productId);
  if (!p) return;
  const rawPrice  = Pricing.getVendorPrice(p.basePrice, p.id, 'V001');
  const cityPrice = Pricing.applyCityMultiplier(rawPrice, _currentCity, _cityMul);
  const allPrices = Pricing.getAllVendorPrices(p.basePrice, p.id, _vendors);
  const stars     = '★'.repeat(Math.round(p.rating)) + '☆'.repeat(5 - Math.round(p.rating));

  const specsHTML = Object.entries(p.specs).map(([k,v]) =>
    `<div class="spec-row"><span class="spec-key">${esc(k)}</span><span class="spec-val">${esc(String(v))}</span></div>`
  ).join('');

  const vendorPricesHTML = allPrices.map((r, i) =>
    `<div class="vp-row ${i===0?'vp-lowest':''}">
      <div>
        <span class="vp-name">${esc(r.vendor_name)}</span>
        <span class="badge ${r.verified?'badge-green':'badge-amber'}" style="margin-left:6px">${r.verified?'✓ Verified':'Unverified'}</span>
      </div>
      <span class="vp-price">${Pricing.formatINR(Pricing.applyCityMultiplier(r.price, _currentCity, _cityMul))}</span>
    </div>`
  ).join('');

  document.getElementById('modal-content').innerHTML = `
    <div class="modal-head">
      <div>
        <div style="font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;color:var(--col-text-muted);margin-bottom:4px">${esc(p.brand)} · ${esc(p.subcategory)}</div>
        <h2 style="font-family:var(--font-display);font-size:1.3rem">${esc(p.name)}</h2>
        <div style="margin-top:6px"><span class="stars">${stars}</span> <span style="color:var(--col-text-muted);font-size:.85rem">${p.rating} · ${p.reviews.toLocaleString('en-IN')} reviews</span></div>
      </div>
      <button style="background:none;border:none;color:var(--col-text-muted);font-size:1.5rem;cursor:pointer;padding:4px" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div>
        <img class="modal-img" src="${esc(p.image)}" alt="${esc(p.name)}">
        <div style="margin-top:var(--sp-md)">
          <div style="font-size:.78rem;color:var(--col-text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Specifications</div>
          ${specsHTML}
        </div>
      </div>
      <div>
        <div style="font-size:.82rem;color:var(--col-text-muted);margin-bottom:4px">Best price in ${esc(_currentCity)}</div>
        <div style="font-family:var(--font-display);font-size:2rem;font-weight:700;margin-bottom:4px">${Pricing.formatINR(cityPrice)}</div>
        <div style="font-size:.82rem;color:var(--col-text-muted);margin-bottom:var(--sp-md)">per ${esc(p.unit)} · Min. order ${p.minOrderQty} ${esc(p.unit)}</div>
        <p style="font-size:.85rem;color:var(--col-text-muted);margin-bottom:var(--sp-lg)">${esc(p.description)}</p>
        <button class="btn btn-primary" style="width:100%;margin-bottom:8px" onclick="addToCart('${esc(p.id)}');closeModal()">Add to Cart</button>
        <div style="font-size:.78rem;text-transform:uppercase;letter-spacing:.06em;color:var(--col-text-muted);margin-top:var(--sp-lg);margin-bottom:8px">All Vendor Prices</div>
        <div class="vendor-price-list">${vendorPricesHTML}</div>
      </div>
    </div>`;

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
}
</script>
</body>
</html>
